services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: idv_user
      POSTGRES_PASSWORD: idv_password
      POSTGRES_DB: idv_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idv_user -d idv_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://idv_user:idv_password@postgres:5432/idv_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: dev-secret-key-change-in-production-abc123
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: "10"
      FACE_SIMILARITY_THRESHOLD: "0.6"
      FRAUD_SCORE_THRESHOLD: "0.7"
      ALLOWED_ORIGINS: "http://localhost,http://localhost:80,http://localhost:5173"
      PYTHONIOENCODING: utf-8
    volumes:
      - upload_data:/app/uploads
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  celery-worker:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://idv_user:idv_password@postgres:5432/idv_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: dev-secret-key-change-in-production-abc123
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: "10"
      FACE_SIMILARITY_THRESHOLD: "0.6"
      FRAUD_SCORE_THRESHOLD: "0.7"
      ALLOWED_ORIGINS: "http://localhost,http://localhost:80,http://localhost:5173"
      PYTHONIOENCODING: utf-8
    volumes:
      - upload_data:/app/uploads
      - hf_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: celery -A app.tasks worker --loglevel=info --concurrency=2

  frontend:
    build: ./frontend
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  upload_data:
  hf_cache:
